services:
  # SQL Server Database
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=Password1!
      - MSSQL_PID=Express
      - MSSQL_GID=0
      - MSSQL_UID=0
    ports:
      - "14333:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - app-network
    restart: always
    user: "0:0"
    command: /opt/mssql/bin/sqlservr

  # .NET 9 Razor Pages Application (Hmm.Idp)
  hmm-idp:
    build:
      context: ..
      dockerfile: DockerFiles/Dockerfile
    container_name: hmm-idp
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=HmmIdp;User Id=sa;Password=Password1!;TrustServerCertificate=True;
    ports:
      - "5080:80"
    depends_on:
      - sqlserver
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge

volumes:
  sqlserver_data:
