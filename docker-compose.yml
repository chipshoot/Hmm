version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: hmm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shcdlhgm1!
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hmm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Seq Log Server (Optional)
  seq:
    image: datalust/seq:latest
    container_name: hmm-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data
    networks:
      - hmm-network

  # Hmm Service API
  hmm-api:
    build:
      context: .
      dockerfile: src/Hmm.ServiceApi/Dockerfile
    container_name: hmm-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourSecurePassword
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    ports:
      - "5000:80"
      - "5002:443"
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - hmm-network
    volumes:
      - ~/.aspnet/https:/https:ro
    restart: unless-stopped

networks:
  hmm-network:
    driver: bridge

volumes:
  postgres-data:
  seq-data:
