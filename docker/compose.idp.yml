# IDP service overlay - extends compose.base.yml
#
# Usage: docker compose -f compose.base.yml -f compose.idp.yml up -d

services:
  hmm-idp:
    build:
      context: ../src/Hmm.Idp
      dockerfile: DockerFiles/Dockerfile
    container_name: hmm-idp
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:80
      - SEED_DATA=true
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/hmm-idp.db
      - IssuerUri=http://localhost:${IDP_PORT}
    ports:
      - "${IDP_PORT}:80"
    volumes:
      - idp-data:/app/data
    networks:
      - hmm-network
    restart: unless-stopped

volumes:
  idp-data:
