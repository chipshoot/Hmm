# Exposes the embedded PostgreSQL inside hmm-idp and hmm-api containers
# to the host so external tools (DBeaver, pgAdmin, psql) can connect.
#
# Each container has its own embedded Postgres on internal port 5432.
# Different host ports are mapped to avoid collision:
#   localhost:5432  -> hmm-idp's Postgres  (HmmIdp database)
#   localhost:5433  -> hmm-api's Postgres  (HmmNotes database)
#
# Usage: append `-f compose.pgport.yml` to your `docker compose` command.
#   docker compose -f compose.base-sqlite.yml -f compose.idp.yml -f compose.api.yml -f compose.pgport.yml up -d
#
# DBeaver / pgAdmin connection settings:
#   --- IDP ---
#     Host:     localhost
#     Port:     5432
#     Database: HmmIdp
#     User:     postgres
#     Password: ${IDP_POSTGRES_PASSWORD}      (see docker/.env)
#
#   --- API ---
#     Host:     localhost
#     Port:     5433
#     Database: HmmNotes
#     User:     postgres
#     Password: ${API_POSTGRES_PASSWORD}      (see docker/.env)
#
# SECURITY: This overlay is for local development only. Never use it on a
# host that's reachable from the public internet — the embedded Postgres
# password lives in docker/.env (committed) and would be exposed.

services:
  hmm-idp:
    ports:
      - "5432:5432"

  hmm-api:
    ports:
      - "5433:5432"
