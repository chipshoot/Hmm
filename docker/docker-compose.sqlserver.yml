# Docker Compose for Full Stack (API + SQL Server + Seq)
# Use this for functional testing with API running in Docker container
#
# Start: docker-compose -f docker/docker-compose.sqlserver.yml up -d --build
# Stop:  docker-compose -f docker/docker-compose.sqlserver.yml down
# Logs:  docker-compose -f docker/docker-compose.sqlserver.yml logs -f

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hmm-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Shcdlhgm1!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    networks:
      - hmm-network
    volumes:
      - sqlserver-data:/var/opt/mssql/data
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Shcdlhgm1!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  seq:
    image: datalust/seq:latest
    container_name: hmm-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:5341"    # Ingestion API (for local tools)
      - "8081:80"      # Web UI
    networks:
      - hmm-network
    volumes:
      - seq-data:/data

  hmm-api:
    build:
      context: ..
      dockerfile: src/Hmm.ServiceApi/Dockerfile
    container_name: hmm-api
    environment:
      - ASPNETCORE_ENVIRONMENT=DockerSqlServer
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - ASPNETCORE_Kestrel__Certificates__Default__Password=YourSecurePassword
      - ASPNETCORE_Kestrel__Certificates__Default__Path=/https/aspnetapp.pfx
    ports:
      - "5000:80"
      - "5001:443"
    depends_on:
      sqlserver:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - hmm-network
    volumes:
      - ${APPDATA}/ASP.NET/Https:/https:ro
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
    restart: unless-stopped

networks:
  hmm-network:
    driver: bridge

volumes:
  sqlserver-data:
  seq-data:
