# Docker Compose for IDP Infrastructure (SQL Server for IDP)
# Use this to run the IDP database separately from the API database
#
# Start: docker-compose -f docker/docker-compose.idp.yml up -d
# Stop:  docker-compose -f docker/docker-compose.idp.yml down

services:
  idp-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hmm-idp-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Password1!"
      MSSQL_PID: "Developer"
    ports:
      - "14333:1433"
    networks:
      - hmm-network
    volumes:
      - idp-sqlserver-data:/var/opt/mssql/data
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Password1!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  hmm-network:
    driver: bridge

volumes:
  idp-sqlserver-data:
